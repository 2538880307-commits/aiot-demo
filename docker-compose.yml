version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: aiot-postgres
    environment:
      POSTGRES_DB: aiot_monitor
      POSTGRES_USER: aiot_user
      POSTGRES_PASSWORD: aiot_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiot_user -d aiot_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: emqx:5.8
    container_name: aiot-emqx
    ports:
      - "1883:1883"
      - "18083:18083"
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 20s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: aiot-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: aiot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
